environment:
  python_bin: /home/ubuntu/trading-system/.venv/bin/python
  duckdb_path: /home/ubuntu/auction-bot/storage/auction.duckdb
  retain_months: 3

telegram:
  enabled: true
  bot_token: ""
  chat_id: "-1003859076473"
  bot_token_env: "TELEGRAM_BOT_TOKEN"
  chat_id_env: "TELEGRAM_CHAT_ID"
  customs_enabled: true
  customs_chat_id: "-1003859076473"
  customs_chat_id_env: ""

alert_conditions:
  min_discount_rate: 0.30
  property_types: ["아파트", "다세대"]
  regions: ["서울"]
  max_appraisal_price: 500000000

